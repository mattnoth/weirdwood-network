<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Family-tree styling fixture — Weirwood</title>
  <!-- Reuse the real theme + base .ft-* styles so the fixture matches the app.
       Open this file directly (file://) or serve web/ — it hits NO API. -->
  <link rel="stylesheet" href="../public/theme/tokens.css" />
  <link rel="stylesheet" href="../public/app.css" />
  <style>
    /* ---- Fixture chrome (not part of the app) ---- */
    body { margin: 0; padding: 24px; background: var(--c-bg); color: var(--c-text);
           font-family: var(--font-ui); }
    .fx-head { display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap; margin-bottom: 6px; }
    .fx-head h1 { font-family: var(--font-prose); font-size: 1.3rem; margin: 0; }
    .fx-note { color: var(--c-text-faint); font-size: var(--fs-small); max-width: 60ch; }
    .fx-controls { display: flex; gap: 8px; margin: 14px 0; align-items: center; flex-wrap: wrap; }
    .fx-btn { font-family: var(--font-ui); font-size: var(--fs-small); color: var(--c-text-dim);
              background: var(--c-surface); border: 1px solid var(--c-border);
              border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; }
    .fx-btn.on { color: var(--c-text); border-color: var(--c-accent); background: var(--c-surface-2); }
    .fx-legend { display: flex; gap: 14px; font-size: var(--fs-cite); color: var(--c-text-faint);
                 font-family: var(--font-mono); margin-left: auto; align-items: center; }
    .fx-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 3px;
                 vertical-align: -1px; margin-right: 4px; border: 1px solid var(--c-border); }
    .fx-pick { min-height: 1.4em; font-size: var(--fs-small); color: var(--c-text-dim); margin-top: 8px; }
    .fx-host { max-width: 980px; }

    /* ======================================================================
       PROMINENCE HIGHLIGHTING — the surface we're iterating.
       prominence = degree + 4·quoteCount (computed in graph.ts familyTree).
       Tiers below are cutoffs; tweak MAJOR/NOTABLE in the script + these rules.
       Major = the people who actually appear (Dany, Rhaegar, Egg, Daemon…);
       minor = historical filler / bare-surname stubs.
       ====================================================================== */
    .ft-dnode.tier-major .ft-dnode-box {
      fill: var(--c-accent-faint);
      stroke: var(--c-accent);
      stroke-width: 1.75;
    }
    .ft-dnode.tier-major .ft-dnode-text .ln1 { font-weight: 700; fill: var(--c-text); }

    .ft-dnode.tier-notable .ft-dnode-box {
      fill: var(--c-surface-2);
      stroke: var(--c-accent-deep);
    }

    /* Minor nodes recede so the important ones read first. */
    .ft-dnode.tier-minor .ft-dnode-box { fill: var(--c-bg); stroke: var(--c-border-soft); }
    .ft-dnode.tier-minor .ft-dnode-text { fill: var(--c-text-faint); }

    /* Clickability affordance: a clickable node lifts on hover; a non-node
       (bare name the graph has no record for) stays flat + dashed. */
    .ft-dnode[role="button"] { cursor: pointer; }
    .ft-dnode[role="button"]:hover .ft-dnode-box { filter: brightness(1.25); }
    .ft-dnode.tier-major .ft-dnode-box, .ft-dnode.tier-notable .ft-dnode-box { transition: filter 140ms ease; }

    /* A small prominence dot on the top-right of high-tier nodes = "worth a click". */
    .ft-prom-dot { fill: var(--c-accent); }
  </style>
</head>
<body>
  <div class="fx-head">
    <h1>Family-tree styling fixture</h1>
    <span class="fx-note">Real captured graph data, no API. Iterate the prominence highlighting in
      the &lt;style&gt; block + the tier cutoffs in the script. Then port to app.css / app.js.</span>
  </div>

  <div class="fx-controls">
    <button class="fx-btn on" data-sample="aegon">Aegon I (messy dynasty · 64)</button>
    <button class="fx-btn" data-sample="ned">Eddard Stark (clean · 27)</button>
    <div class="fx-legend">
      <span><span class="fx-swatch" style="background:var(--c-accent-faint);border-color:var(--c-accent)"></span>major</span>
      <span><span class="fx-swatch" style="background:var(--c-surface-2);border-color:var(--c-accent-deep)"></span>notable</span>
      <span><span class="fx-swatch" style="background:var(--c-bg)"></span>minor</span>
    </div>
  </div>

  <div class="fx-host">
    <div id="host"></div>
    <div class="fx-pick" id="pick">Click a name to see its prominence.</div>
  </div>

  <script src="fixtures/family-tree-data.js"></script>
  <script>
    // ---- Prominence tiers (tweak these) ----
    const P_MAJOR = 40;    // degree+4·quotes at/above this = a marquee character
    const P_NOTABLE = 12;  // …and above this = notable
    const tierOf = (p) => (p >= P_MAJOR ? "major" : p >= P_NOTABLE ? "notable" : "minor");

    // ---- Layout (mirror of app.js descendantLayout: left-to-right tidy tree) ----
    const NODE_W = 148, NODE_H = 38, X_GAP = 44, Y_GAP = 10, PAD = 16;
    const SVGNS = "http://www.w3.org/2000/svg";
    const svgEl = (tag, attrs = {}, kids = []) => {
      const n = document.createElementNS(SVGNS, tag);
      for (const [k, v] of Object.entries(attrs)) if (v != null && v !== false) n.setAttribute(k, v);
      for (const c of [].concat(kids)) if (c != null && c !== false) n.append(c.nodeType ? c : document.createTextNode(String(c)));
      return n;
    };
    function nameLines(name) {
      const p = String(name).match(/^(.*?)\s*(\(.*\))$/);
      if (p) return [p[1].trim(), p[2].trim()];
      if (name.length <= 20) return [name];
      const w = name.split(" ");
      if (w.length > 1) { let l1 = "", i = 0; while (i < w.length && (l1 + " " + w[i]).trim().length <= 18) { l1 = (l1 + " " + w[i]).trim(); i++; } const l2 = w.slice(i).join(" "); return l2 ? [l1, l2] : [l1]; }
      return [name];
    }
    const clip = (s, n) => (s.length > n ? s.slice(0, n - 1) + "…" : s);

    function layout(result) {
      const member = new Map(result.members.map((m) => [m.slug, m]));
      const rootSlug = result.root;
      const kids = new Map();
      for (const b of result.parentBonds || []) {
        if (!member.has(b.parent) || !member.has(b.child)) continue;
        (kids.get(b.parent) || kids.set(b.parent, []).get(b.parent)).push(b.child);
      }
      const treeParent = new Map(), seen = new Set([rootSlug]), q = [rootSlug], tkids = new Map();
      while (q.length) { const n = q.shift(); for (const c of kids.get(n) || []) { if (seen.has(c)) continue; seen.add(c); treeParent.set(c, n); (tkids.get(n) || tkids.set(n, []).get(n)).push(c); q.push(c); } }
      const depth = new Map([[rootSlug, 0]]), bfs = [rootSlug];
      for (let i = 0; i < bfs.length; i++) { const n = bfs[i]; for (const c of tkids.get(n) || []) { depth.set(c, depth.get(n) + 1); bfs.push(c); } }
      const slot = new Map(); let next = 0;
      const assign = (n) => { const ch = tkids.get(n) || []; if (!ch.length) { slot.set(n, next++); return; } ch.forEach(assign); slot.set(n, (slot.get(ch[0]) + slot.get(ch[ch.length - 1])) / 2); };
      assign(rootSlug);
      const sx = NODE_W + X_GAP, sy = NODE_H + Y_GAP, pos = new Map();
      for (const n of seen) pos.set(n, { x: PAD + depth.get(n) * sx, y: PAD + slot.get(n) * sy, m: member.get(n) });
      const maxDepth = Math.max(...[...depth.values()]);
      return { pos, edges: [...treeParent].map(([c, p]) => [p, c]), width: PAD * 2 + (maxDepth + 1) * sx, height: PAD * 2 + next * sy, rootY: pos.get(rootSlug).y };
    }

    function render(result) {
      const lay = layout(result);
      const edges = lay.edges.map(([p, c]) => {
        const a = lay.pos.get(p), b = lay.pos.get(c);
        const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2, x2 = b.x, y2 = b.y + NODE_H / 2, mx = (x1 + x2) / 2;
        return svgEl("path", { class: "ft-link", d: `M ${x1} ${y1} H ${mx} V ${y2} H ${x2}`, fill: "none" });
      });
      const nodes = [...lay.pos.values()].map(({ x, y, m }) => {
        const lines = nameLines(m.name), isRoot = m.slug === result.root, tier = tierOf(m.prominence);
        const g = svgEl("g", { class: `ft-dnode tier-${tier}` + (isRoot ? " hub" : "") + (m.hasNode ? "" : " no-node"), transform: `translate(${x} ${y})` });
        g.dataset.slug = m.slug; g.dataset.prom = m.prominence; g.dataset.deg = m.degree; g.dataset.q = m.quoteCount; g.dataset.name = m.name;
        if (m.hasNode) { g.setAttribute("role", "button"); g.setAttribute("tabindex", "0"); }
        g.append(svgEl("title", {}, `${m.name} — prominence ${m.prominence} (degree ${m.degree}, ${m.quoteCount} quotes)`));
        g.append(svgEl("rect", { class: "ft-dnode-box", width: NODE_W, height: NODE_H, rx: 6 }));
        if (tier === "major") g.append(svgEl("circle", { class: "ft-prom-dot", cx: NODE_W - 8, cy: 8, r: 3 }));
        const t = svgEl("text", { class: "ft-dnode-text", x: NODE_W / 2, y: lines.length > 1 ? NODE_H / 2 - 6 : NODE_H / 2 });
        lines.forEach((ln, i) => t.append(svgEl("tspan", { x: NODE_W / 2, dy: i === 0 ? 0 : 14, class: i === 0 ? "ln1" : "ln2" }, clip(ln, 22))));
        g.append(t);
        return g;
      });
      const svg = svgEl("svg", { class: "ft-diagram", width: lay.width, height: lay.height, viewBox: `0 0 ${lay.width} ${lay.height}` },
        [svgEl("g", { class: "ft-links" }, edges), svgEl("g", { class: "ft-nodes" }, nodes)]);
      svg.addEventListener("click", (e) => {
        const g = e.target.closest && e.target.closest(".ft-dnode");
        if (!g) return;
        document.getElementById("pick").textContent =
          `${g.dataset.name} — prominence ${g.dataset.prom} (degree ${g.dataset.deg}, ${g.dataset.q} quotes) · ${g.classList.contains("no-node") ? "no node" : "clickable → dossier in the app"}`;
      });
      const scroll = document.createElement("div");
      scroll.className = "ft-diagram-scroll";
      scroll.style.maxHeight = "68vh";
      scroll.append(svg);
      const cap = document.createElement("figcaption");
      cap.className = "ft-diagram-cap";
      const majors = result.members.filter((m) => m.prominence >= P_MAJOR).length;
      cap.textContent = `${result.rootName} — descendants · ${result.members.length} kin · ${majors} highlighted`;
      const fig = document.createElement("figure");
      fig.className = "ft-diagram-wrap";
      fig.append(cap, scroll);
      requestAnimationFrame(() => { scroll.scrollLeft = 0; scroll.scrollTop = Math.max(0, (lay.rootY + NODE_H / 2) - scroll.clientHeight / 2); });
      return fig;
    }

    const host = document.getElementById("host");
    function show(key) {
      host.replaceChildren(render(window.FT_SAMPLES[key]));
      for (const b of document.querySelectorAll(".fx-btn")) b.classList.toggle("on", b.dataset.sample === key);
    }
    for (const b of document.querySelectorAll(".fx-btn")) b.addEventListener("click", () => show(b.dataset.sample));
    show("aegon");
  </script>
</body>
</html>
