; Minimal pytest config (query-layer Track, step 2 — S191).
; testpaths: the legacy suite (tests/) + the traversal suite (graph/query/tests/).
; The `corpus` marker gates real-graph smoke tests — they auto-skip when the
; live graph isn't present; deselect explicitly with `-m "not corpus"`.
[pytest]
testpaths = tests graph/query/tests
markers =
    corpus: tests that read the real graph (graph/nodes/, graph/edges/); skipped when absent
