# Netlify config — The Weirwood Network chat-UI alpha (Session 171).
#
# Deploys a BUILD OUTPUT, never the whole repo: the static page in web/public +
# the Edge function in web/netlify/edge-functions. The ~12 MB generated data
# bundle (web/data/, gitignored) is produced by the graph/query/build/ builders
# at build time and read by the Edge function at cold start.
#
# Runtime decision (S171 spike): EDGE FUNCTIONS (Deno/TypeScript). Their 50 ms
# limit is CPU-only and EXCLUDES time spent waiting on the Claude API, with a
# 40 s response-header window — the right fit for a streaming multi-tool turn.
# (A Node Function's 10 s/26 s wall-clock would strangle the agentic loop.)

[build]
  publish = "web/public"
  edge_functions = "web/netlify/edge-functions"
  # The data bundle is generated, not committed. Regenerate it during deploy so
  # Netlify always ships from the live graph. (python3 is available in Netlify's
  # build image.) Local dev can just run the builders once by hand.
  # web/data/ is read only by the Edge functions at cold start; the landing starts
  # clean (S175 removed the Tywin featured-exchange placeholder) so nothing is
  # copied into web/public/data/ and the front-end fetches only /api/chat + /api/node.
  # S191: the command builds ALL FIVE bundle files web/src/lib/data.ts imports —
  # core bundle (alias-map/nodes/edges/manifest) + search-index.json +
  # theme-index.json. Before S191 only the core bundle was rebuilt here; the two
  # index files shipped whatever happened to sit in the local working tree
  # (the search/list/theme tools would go stale — or break on a clean checkout).
  # S194: + build_node_assets.py — the per-node dossier assets (web/public/node/,
  # gitignored) now also regenerate at build time, so a clean checkout deploys
  # complete dossiers (narrative arc + body sections), not whatever the local
  # working tree happened to hold.
  command = "python3 graph/query/build/build_chat_bundle.py --built-at \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" && python3 graph/query/build/build_search_index.py && python3 graph/query/build/build_theme_index.py && python3 graph/query/build/build_node_assets.py --clean"

# The chat endpoint. The browser POSTs here; the function holds ANTHROPIC_API_KEY
# server-side and streams the reply back. (Implemented in the function chunk.)
[[edge_functions]]
  path = "/api/chat"
  function = "chat"

# The node-lookup endpoint. The browser GETs /api/node?slug= to open a node's
# dossier (name, type, identity, curated quotes). Keyless, no model call — a plain
# read of the same in-memory graph bundle the chat function loads. (S177)
[[edge_functions]]
  path = "/api/node"
  function = "node"

[functions]
  # No standard (Node) Functions in the alpha — the chat path is an Edge function.
  # Placeholder kept so the section exists if a non-streaming helper is added later.
